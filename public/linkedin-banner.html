<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Mieterlotse · LinkedIn Banner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ml-bg: #ffffff;
        --ml-bg-soft: #f8fafc;
        --ml-ink: #0f172a;
        --ml-ink-soft: #475569;
        --ml-ink-whisper: #94a3b8;
        --ml-line: #e2e8f0;
        --ml-cta: #ec6426;
        --ml-cta-soft: #fde4d1;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        background: #cbd5e1;
        font-family: "Inter", ui-sans-serif, system-ui, -apple-system,
          "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: var(--ml-ink);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }

      /* ────────────────────────────────────────────────
         LinkedIn Profile Banner — exact 1584 × 396
         Bei Export bitte am Element .banner screenshoten.
         ──────────────────────────────────────────────── */
      .banner {
        width: 1584px;
        height: 396px;
        background: #ffffff;
        position: relative;
        display: grid;
        grid-template-columns: 1fr 460px;
        overflow: hidden;
        box-shadow: 0 30px 80px -30px rgba(15, 23, 42, 0.35);
      }

      /* Top orange stripe */
      .banner::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 6px;
        background: var(--ml-cta);
        z-index: 3;
      }

      /* Bottom orange stripe (kleiner, nur unter Logo-Spalte) */
      .banner::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 460px;
        height: 4px;
        background: var(--ml-cta);
        z-index: 3;
      }

      /* ───── LEFT panel ───── */
      .left {
        padding: 76px 90px 70px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      /* Wordmark */
      .logo {
        display: inline-flex;
        align-items: baseline;
        line-height: 1;
      }
      .logo-wordmark {
        font-weight: 800;
        font-size: 64px;
        letter-spacing: -0.035em;
        line-height: 1;
        color: var(--ml-ink);
        text-transform: lowercase;
        white-space: nowrap;
      }
      .logo-i {
        position: relative;
        display: inline-block;
      }
      .logo-arrow {
        position: absolute;
        left: 50%;
        top: -16px;
        transform: translateX(-50%);
        width: 30px;
        height: 30px;
        pointer-events: none;
      }

      /* Headline */
      .headline {
        font-weight: 900;
        font-size: 56px;
        line-height: 1.05;
        letter-spacing: -0.035em;
        color: var(--ml-ink);
        margin-top: 8px;
      }
      .highlight {
        display: inline;
        -webkit-box-decoration-break: clone;
        box-decoration-break: clone;
        padding-inline: 6px;
        margin-inline: -6px;
        background-image: linear-gradient(
          to top,
          rgba(253, 216, 53, 0.42) 0%,
          rgba(253, 216, 53, 0.42) 38%,
          transparent 38%
        );
      }

      /* ───── RIGHT panel ───── */
      .right {
        background: var(--ml-cta-soft);
        padding: 56px 56px 50px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
      }
      .right::before {
        content: "";
        position: absolute;
        top: 28px;
        bottom: 28px;
        left: 0;
        width: 1px;
        background: rgba(236, 100, 38, 0.22);
      }

      .kpis {
        display: flex;
        flex-direction: column;
        gap: 26px;
      }
      .kpi-value {
        font-family: "Inter", ui-sans-serif, system-ui;
        font-weight: 800;
        font-size: 28px;
        letter-spacing: -0.025em;
        color: var(--ml-cta);
        line-height: 1;
      }
      .kpi-value .infinity {
        font-size: 36px;
        line-height: 0.85;
        display: inline-block;
      }
      .kpi-label {
        margin-top: 6px;
        font-size: 15px;
        font-weight: 500;
        color: var(--ml-ink);
        letter-spacing: -0.005em;
        line-height: 1.35;
      }

      .url {
        font-size: 17px;
        font-weight: 700;
        color: var(--ml-cta);
        letter-spacing: -0.01em;
        line-height: 1;
      }

      /* Hint outside the banner */
      .hint {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 12px;
        font-weight: 500;
        color: rgba(15, 23, 42, 0.6);
        background: rgba(255, 255, 255, 0.85);
        padding: 6px 12px;
        border-radius: 4px;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div class="banner">
      <!-- LEFT -->
      <div class="left">
        <div class="logo" aria-label="mieterlotse">
          <span class="logo-wordmark"
            >m<span class="logo-i"
              >&#x0131;<svg class="logo-arrow" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M20.2 3.8 L5.1 11.1 L11.7 13.4 L14.1 19.9 Z"
                  fill="var(--ml-cta)"
                /></svg></span
            >eterlotse</span
          >
        </div>

        <h1 class="headline">
          Ihr Team soll verwalten.<br />
          Nicht Anfragen <span class="highlight">beantworten.</span>
        </h1>
      </div>

      <!-- RIGHT -->
      <div class="right">
        <div class="kpis">
          <div>
            <div class="kpi-value">24/7</div>
            <div class="kpi-label">KI-Telefon &amp; E-Mail</div>
          </div>
          <div>
            <div class="kpi-value">
              <span class="infinity">&#x221E;</span>
            </div>
            <div class="kpi-label">Unbegrenzte Anrufminuten</div>
          </div>
          <div>
            <div class="kpi-value">30 Tage</div>
            <div class="kpi-label">Live-Pilot — kostenlos starten</div>
          </div>
        </div>

        <div class="url">immobilienverwaltung-automation.de</div>
      </div>
    </div>

    <div class="hint">
      Format 1584 × 396 px (LinkedIn Profil-Banner). Element <code>.banner</code> screenshoten.
    </div>
  </body>
</html>
